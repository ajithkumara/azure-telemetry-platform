resources:
  jobs:
    telemetry_pipeline_job:
      name: "Azure Telemetry Pipeline"

      schedule:
        quartz_cron_expression: "0 0 2 * * ?"
        timezone_id: "UTC"
        pause_status: UNPAUSED

      tasks:
        - task_key: bronze_ingestion
          notebook_task:
            notebook_path: ../notebooks/bronze.py
            source: WORKSPACE
          job_cluster_key: telemetry_cluster

        - task_key: silver_transform
          depends_on:
            - task_key: bronze_ingestion
          notebook_task:
            notebook_path: ../notebooks/silver.py
            source: WORKSPACE
          job_cluster_key: telemetry_cluster

        - task_key: gold_aggregate
          depends_on:
            - task_key: silver_transform
          notebook_task:
            notebook_path: ../notebooks/gold.py
            source: WORKSPACE
          job_cluster_key: telemetry_cluster

      job_clusters:
        - job_cluster_key: telemetry_cluster
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 2
            spark_conf:
              "spark.databricks.delta.preview.enabled": "true"

      email_notifications:
        on_failure:
          - ""
