resources:
  pipelines:
    telemetry_dlt_pipeline:
      name: "Azure Telemetry DLT Pipeline"

      catalog: "dbw_telemetry_dev"
      target: silver

      development: true
      continuous: false
      photon: true

      libraries:
        - notebook:
            path: ../notebooks/bronze.py
        - notebook:
            path: ../notebooks/silver.py
        - notebook:
            path: ../notebooks/gold.py

      serverless: true

      configuration:
        bronze_path: "abfss://datalake@sttelemetrydev2026.dfs.core.windows.net/bronze"
        # Neutralise any stale workspace-level account-key configs for both storage accounts.
        # Unity Catalog External Location (via Access Connector MSI) is the correct auth path.
        spark.hadoop.fs.azure.account.auth.type.sttelemetrydev2026.dfs.core.windows.net: "OAuth"
        spark.hadoop.fs.azure.account.oauth.provider.type.sttelemetrydev2026.dfs.core.windows.net: "org.apache.hadoop.fs.azurebfs.oauth2.MsiTokenProvider"
        spark.hadoop.fs.azure.account.auth.type.stmscaidev2026.dfs.core.windows.net: "OAuth"
        spark.hadoop.fs.azure.account.oauth.provider.type.stmscaidev2026.dfs.core.windows.net: "org.apache.hadoop.fs.azurebfs.oauth2.MsiTokenProvider"
