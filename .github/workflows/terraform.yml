name: 'Terraform Validation & Planning'

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform_validation:
    name: 'Terraform Validate and Plan'
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    steps:
      # Checkout the repository
      - name: Checkout
        uses: actions/checkout@v3

      # Install the preferred version of Terraform CLI
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      # Check format of HCL code
      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      # Initialize and validate dev environment
      - name: Terraform Init & Validate (Dev)
        run: |
          cd terraform/environments/dev
          terraform init -backend=false
          terraform validate

      # Initialize and validate test environment
      - name: Terraform Init & Validate (Test)
        run: |
          cd terraform/environments/test
          terraform init -backend=false
          terraform validate

      # Initialize and validate prod environment
      - name: Terraform Init & Validate (Prod)
        run: |
          cd terraform/environments/prod
          terraform init -backend=false
          terraform validate
